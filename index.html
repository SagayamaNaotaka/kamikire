<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kamikire">
<title>Kamikire</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kamikire">
<meta name="theme-color" content="#f7f6f3">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f7f6f3;
    --border: #e0ddd8;
    --accent: #c8442a;
    --text: #37352f;
    --text-dim: #9b9b9b;
    --header-h: 48px;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }
  body { display: flex; flex-direction: column; }

  /* ── HEADER ── */
  #header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  #logo {
    font-size: 11px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  #logo svg { opacity: 0.9; }

  #header-right {
    display: flex; align-items: center; gap: 10px;
  }
  #copy-btn {
    height: 26px; padding: 0 10px;
    background: none; border: 1px solid var(--border);
    border-radius: 2px; color: var(--text-dim);
    font-size: 10px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  #copy-btn:hover, #copy-btn:active { color: var(--accent); border-color: var(--accent); }

  #status {
    font-size: 11px; display: flex; align-items: center; gap: 5px;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    transition: opacity 0.3s;
  }
  #status-dot.saved { opacity: 0.4; }

  /* ── EDITOR ── */
  #editor-wrap {
    flex: 1; display: flex; flex-direction: column;
    min-height: 0; padding: 24px 20px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }

  #editor {
    flex: 1; width: 100%;
    border: none; outline: none; resize: none;
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; line-height: 1.8;
    caret-color: var(--accent);
    min-height: calc(100dvh - var(--header-h) - 48px);
  }
  #editor::placeholder { color: var(--text-dim); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #fff;
    border-radius: 4px; padding: 8px 16px;
    font-size: 13px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="header">
  <div id="logo">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="1" width="12" height="12" rx="1" stroke="#c8442a" stroke-width="1.2"/>
      <path d="M3 4h8M3 7h6M3 10h7" stroke="#c8442a" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Kamikire
  </div>
  <div id="header-right">
    <button id="clear-btn" onclick="clearText()" style="height:26px; padding:0 10px; background:none; border:1px solid var(--border); border-radius:2px; color:var(--text-dim); font-size:10px; font-family:'DM Sans',sans-serif; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; opacity:0.3; pointer-events:none; -webkit-tap-highlight-color:transparent; transition:color 0.15s, border-color 0.15s, opacity 0.15s;">Clear</button>
    <button id="copy-btn" onclick="copyText()">Copy</button>
    <div id="status">
      <div id="status-dot saved" id="status-dot"></div>
    </div>
  </div>
</div>

<div id="editor-wrap">
  <textarea id="editor" placeholder="ここに書く"></textarea>
</div>

<div id="toast"></div>

<script>
const LS_KEY = 'kamikire-v1';
const editorEl = document.getElementById('editor');
const statusDot = document.getElementById('status-dot');

// localStorage安全アクセス
function load() { try { return localStorage.getItem(LS_KEY) || ''; } catch(e) { return ''; } }
function save(v) { try { localStorage.setItem(LS_KEY, v); return true; } catch(e) { return false; } }

// 保存データ読み込み
editorEl.value = load();

// 自動保存
let saveTimer = null;
editorEl.addEventListener('input', () => {
  statusDot.classList.remove('saved');
  updateClearBtn();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    save(editorEl.value);
    statusDot.classList.add('saved');
  }, 500);
});

// コピー
let lastCopiedText = null;
function copyText() {
  const text = editorEl.value;
  navigator.clipboard.writeText(text).then(() => {
    lastCopiedText = text;
    updateClearBtn();
    showToast('コピーしました');
  });
}

// CLEARボタンの有効/無効
function updateClearBtn() {
  const clearBtn = document.getElementById('clear-btn');
  const canClear = lastCopiedText !== null && lastCopiedText === editorEl.value;
  clearBtn.style.opacity = canClear ? '1' : '0.3';
  clearBtn.style.pointerEvents = canClear ? 'auto' : 'none';
}

// クリア
function clearText() {
  editorEl.value = '';
  save('');
  lastCopiedText = null;
  updateClearBtn();
  editorEl.focus();
  showToast('クリアしました');
}

// トースト
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 起動時フォーカス
editorEl.focus();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
